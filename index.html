<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRYPTMAIL | ADMIN TERMINAL</title>
<link rel="icon" href="https://www.google.com/s2/favicons?domain=classroom.google.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #7c3aed; --purple-bright: #a855f7; --purple-glow: #c084fc;
    --red: #ef4444; --green: #22c55e; --cyan: #06b6d4; --yellow: #eab308;
    --bg: #030712; --bg2: #0a0f1e; --border: #1e293b;
    --text: #e2e8f0; --text-dim: #64748b; --text-muted: #374151;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background: var(--bg); color: var(--text); 
    font-family: 'Share Tech Mono', monospace; 
    min-height: 100vh; overflow-x: hidden; cursor: crosshair; 
  }
  body::before { 
    content:''; position:fixed; inset:0; 
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px); 
    pointer-events:none; z-index:9999; opacity: 0.5;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes scroll-text { 0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} }

  /* --- Account Screen --- */
  .account-screen { position:fixed; inset:0; background:var(--bg); z-index:900; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .account-logo { font-family:'Orbitron'; font-weight:900; font-size:42px; color:var(--purple-glow); letter-spacing:8px; margin-bottom: 20px; }
  .account-logo span { color: var(--red); animation: blink 1s infinite; }
  .account-form-wrap { background: var(--bg2); border: 1px solid var(--purple); padding: 30px; display: flex; flex-direction: column; gap: 15px; width: 350px; }
  
  /* --- Shared UI --- */
  .form-input, .form-textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); padding: 10px; font-family: inherit; outline: none; }
  .btn-primary { background: var(--purple); color: white; border: 1px solid var(--purple-bright); padding: 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 2px; transition: 0.3s; }
  .btn-primary:hover { background: var(--purple-bright); box-shadow: 0 0 15px var(--purple); }

  /* --- Main Layout --- */
  #app-interface { display: none; flex-direction: column; height: 100vh; }
  #app-interface.active { display: flex; }
  .ticker { background: #1a0a00; border-bottom: 2px solid var(--red); overflow: hidden; padding: 5px 0; }
  .ticker-inner { display: inline-block; animation: scroll-text 30s linear infinite; color: var(--red); font-size: 11px; }
  .header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .nav-tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .nav-tab { padding: 12px 20px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-family: inherit; white-space: nowrap; }
  .nav-tab.active { color: var(--purple-glow); border-bottom: 2px solid var(--purple); background: rgba(124,58,237,0.05); }

  .main-container { display: grid; grid-template-columns: 280px 1fr; flex: 1; overflow: hidden; }
  .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .inbox-list { flex: 1; overflow-y: auto; }
  .inbox-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .inbox-item:hover { background: rgba(124,58,237,0.1); }
  
  .content-area { flex: 1; overflow-y: auto; position: relative; background: rgba(0,0,0,0.2); }
  .panel { display: none; padding: 25px; animation: fadeIn 0.3s; }
  .panel.active { display: block; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* --- Admin Console Specific --- */
  .console-wrap { background: #000; border: 1px solid var(--green); height: 100%; display: flex; flex-direction: column; font-family: 'Share Tech Mono'; }
  .console-output { flex: 1; padding: 15px; overflow-y: auto; color: var(--green); font-size: 13px; line-height: 1.5; }
  .console-input-row { display: flex; padding: 10px; border-top: 1px solid #14532d; background: #051505; }
  .console-input-row span { color: var(--green); margin-right: 10px; }
  .console-input { background: transparent; border: none; color: var(--green); flex: 1; outline: none; font-family: inherit; }
  .log-warn { color: var(--yellow); }
  .log-error { color: var(--red); }
  .log-success { color: var(--cyan); }

  /* --- UI Helpers --- */
  .hidden { display: none !important; }
  .call-overlay { position: fixed; inset: 0; background: rgba(3,7,18,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  .call-overlay.active { display: flex; }
</style>
</head>
<body>

  <div id="account-screen" class="account-screen">
    <div class="account-logo">CRYPT<span>MAIL</span></div>
    <div class="account-form-wrap">
      <input type="text" class="form-input" placeholder="TERMINAL ID" value="ADMIN_USR">
      <input type="password" class="form-input" placeholder="ACCESS KEY" value="••••••••">
      <button class="btn-primary" onclick="login()">INITIALIZE ACCESS</button>
    </div>
  </div>

  <div id="app-interface">
    <div class="ticker">
      <div class="ticker-inner">SYSTEM STATUS: ALL ENCRYPTION NODES ACTIVE... NO BREACHES DETECTED... ADMIN CONSOLE ENABLED...</div>
    </div>

    <header class="header">
      <div style="font-family:'Orbitron'; font-weight:900; color:var(--purple-glow); letter-spacing:2px">CRYPTMAIL <span style="font-size:10px; color:var(--red)">v2.0_ADVANCED</span></div>
      <div style="display:flex; gap:15px; font-size:12px; align-items:center">
        <div id="clock">00:00:00</div>
      </div>
    </header>

    <nav class="nav-tabs">
      <button class="nav-tab active" onclick="showPanel('mail')">MESSAGES</button>
      <button class="nav-tab" onclick="showPanel('game')">MINIGAME</button>
      <button class="nav-tab" onclick="showPanel('canvas')">WHITEBOARD</button>
      <button class="nav-tab" onclick="showPanel('admin')" style="color:var(--green)">>_ ADMIN</button>
    </nav>

    <div class="main-container">
      <aside class="sidebar" id="sidebar">
        <button class="btn-primary" style="margin:10px" onclick="compose()">+ COMPOSE</button>
        <div class="inbox-list" id="inbox"></div>
      </aside>

      <main class="content-area">
        <div id="mail-panel" class="panel active">
          <div id="mail-content"><div style="text-align:center; color:var(--text-muted); margin-top:50px">SELECT A DATA PACKET</div></div>
          <div id="compose-view" class="hidden">
            <input type="text" id="to" class="form-input" placeholder="RECIPIENT" style="margin-bottom:10px">
            <textarea id="msg" class="form-textarea" placeholder="ENCRYPTED CONTENT..." style="height:200px; margin-bottom:10px"></textarea>
            <button class="btn-primary" onclick="sendMessage()">SEND PACKET</button>
          </div>
        </div>

        <div id="game-panel" class="panel">
          <h3>TIC-TAC-TOE UNIT</h3>
          <div id="board" style="display:grid; grid-template-columns: repeat(3, 80px); gap:5px; margin-top:20px"></div>
          <button class="btn-primary" style="margin-top:20px" onclick="resetGame()">REBOOT GAME</button>
        </div>

        <div id="canvas-panel" class="panel">
          <div style="display:flex; gap:10px; margin-bottom:10px">
            <button class="btn-primary" onclick="clearCanvas()">WIPE</button>
          </div>
          <div style="background:#000; border:1px solid var(--border); height:400px">
            <canvas id="canvas" style="width:100%; height:100%"></canvas>
          </div>
        </div>

        <div id="admin-panel" class="panel" style="padding:0; height:100%">
          <div class="console-wrap">
            <div class="console-output" id="console-log">
              <div>[SYSTEM] CryptMail Admin Console v2.0</div>
              <div>[SYSTEM] Type 'help' for available commands.</div>
              <br>
            </div>
            <div class="console-input-row">
              <span>root@cryptmail:~#</span>
              <input type="text" class="console-input" id="console-input" autofocus>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // --- Core Logic ---
    function login() {
      document.getElementById('account-screen').style.display = 'none';
      document.getElementById('app-interface').style.display = 'flex';
      renderInbox();
      initCanvas();
    }

    function showPanel(id) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById(id + '-panel').classList.add('active');
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      if(id === 'admin') setTimeout(() => document.getElementById('console-input').focus(), 10);
    }

    // --- Mail ---
    let msgs = [{id:1, from:'SYS_ADMIN', body:'Terminal access granted. Command "override" is now available.'}];
    function renderInbox() {
      document.getElementById('inbox').innerHTML = msgs.map(m => `
        <div class="inbox-item" onclick="readMsg(${m.id})">
          <div style="color:var(--purple-glow)">${m.from}</div>
          <div style="font-size:11px; color:var(--text-dim)">Encrypted Packet</div>
        </div>`).join('');
    }
    function readMsg(id) {
      const m = msgs.find(x => x.id === id);
      document.getElementById('compose-view').classList.add('hidden');
      document.getElementById('mail-content').innerHTML = `
        <div style="border:1px solid var(--purple); padding:20px; background:rgba(124,58,237,0.05)">
          <div style="color:var(--red); font-size:12px; margin-bottom:10px">⚠️ AUTO-ERASE IN 60s</div>
          <div style="margin-bottom:15px; font-size:11px">FROM: ${m.from}</div>
          <div>${m.body}</div>
        </div>`;
    }
    function compose() { document.getElementById('mail-content').innerHTML = ''; document.getElementById('compose-view').classList.remove('hidden'); }
    function sendMessage() { alert("ENCRYPTED & SENT"); compose(); }

    // --- Admin Console Logic ---
    const consoleInput = document.getElementById('console-input');
    const consoleLog = document.getElementById('console-log');

    consoleInput.addEventListener('keydown', (e) => {
      if(e.key === 'Enter') {
        const cmd = consoleInput.value.trim().toLowerCase();
        executeCommand(cmd);
        consoleInput.value = '';
      }
    });

    function executeCommand(cmd) {
      printLog(`root@cryptmail:~# ${cmd}`);
      if(!cmd) return;

      switch(cmd) {
        case 'help':
          printLog("Available commands:", "log-success");
          printLog("- status: Check system health");
          printLog("- logs: Show security logs");
          printLog("- clear: Clear console history");
          printLog("- override: Attempt server bypass");
          printLog("- users: List connected terminals");
          break;
        case 'status':
          printLog("CPU: 12% | MEM: 44% | ENCRYPTION: AES-256-GCM | OVERRIDE: READY");
          break;
        case 'logs':
          printLog("[10:02:11] Unauthorized ping from 192.168.1.1", "log-warn");
          printLog("[10:03:05] Admin login successful", "log-success");
          printLog("[10:04:50] Brute force detected on Node 7", "log-error");
          break;
        case 'clear':
          consoleLog.innerHTML = '';
          break;
        case 'users':
          printLog("Connected: [ADMIN_USR], [USER_774], [NODE_X]");
          break;
        case 'override':
          printLog("Starting bypass sequence...", "log-warn");
          let p = 0;
          const int = setInterval(() => {
            p += 20;
            printLog(`Bypassing firewall... ${p}%`);
            if(p >= 100) {
              clearInterval(int);
              printLog("ACCESS GRANTED: ROOT SERVER ACCESSED", "log-success");
            }
          }, 400);
          break;
        default:
          printLog(`Unknown command: ${cmd}`, "log-error");
      }
      consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    function printLog(text, className = "") {
      const div = document.createElement('div');
      div.className = className;
      div.innerText = text;
      consoleLog.appendChild(div);
    }

    // --- Others (Canvas, Game, Clock) ---
    function initCanvas() {
      const c = document.getElementById('canvas'); const ctx = c.getContext('2d');
      c.width = c.parentElement.clientWidth; c.height = 400;
      let drawing = false; ctx.strokeStyle = '#7c3aed';
      c.onmousedown = () => drawing = true; window.onmouseup = () => { drawing = false; ctx.beginPath(); };
      c.onmousemove = (e) => { if(!drawing) return; const r = c.getBoundingClientRect(); ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke(); };
      window.clearCanvas = () => ctx.clearRect(0,0,c.width,c.height);
    }
    let bState = Array(9).fill('');
    function resetGame() { 
      bState.fill(''); 
      const b = document.getElementById('board'); b.innerHTML = '';
      bState.forEach((_,i) => {
        const cell = document.createElement('div');
        cell.style = "width:80px;height:80px;background:#0a0f1e;border:1px solid #1e293b;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer";
        cell.onclick = () => { if(bState[i]) return; bState[i]='X'; cell.innerText='X'; cell.style.color='var(--purple-glow)'; };
        b.appendChild(cell);
      });
    }
    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    resetGame();
  </script>
</body>
</html>
